<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<title>ClassHub Backstage · 캘린더</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="_shared.css">
<style>
  .cal-layout{ display:grid; grid-template-columns:1fr 360px; gap:20px; margin-top:20px; align-items:start; }
  .cal-card{ background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:22px 24px; }
  .cal-topline{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .cal-month{ font-size:22px; font-weight:800; letter-spacing:-0.01em; color:var(--text); }
  .cal-navs{ display:flex; align-items:center; gap:4px; }
  .cal-nav{ width:32px; height:32px; border:1px solid var(--border); background:var(--surface); border-radius:8px; cursor:pointer; color:var(--text-sub); font-size:16px; display:grid; place-items:center; font-family:inherit; }
  .cal-nav:hover{ background:var(--surface-alt); }
  .cal-today{ height:32px; padding:0 12px; border:1px solid var(--border); background:var(--surface); border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-sub); font-family:inherit; margin-left:4px; }

  .cal-weekhead{ display:grid; grid-template-columns:repeat(7,1fr); border-bottom:1px solid var(--border); }
  .cal-weekhead span{ text-align:left; padding:8px 8px; font-size:13px; font-weight:700; color:var(--text-sub); }
  .cal-weekhead span.sun{ color:var(--highlight); }
  .cal-weekhead span.sat{ color:var(--info); }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); grid-auto-rows:112px; }
  .cal-cell{ border-right:1px solid var(--border); border-bottom:1px solid var(--border); padding:7px 8px; cursor:pointer; overflow:hidden; transition:.1s; }
  .cal-cell:nth-child(7n){ border-right:none; }
  .cal-cell:hover{ background:var(--surface-alt); }
  .cal-cell.sel{ background:var(--surface-alt); box-shadow:inset 0 0 0 1.5px var(--border-strong); border-radius:8px; }
  .cal-cell.other .cal-date{ color:var(--text-placeholder); }
  .cal-date{ font-size:14px; font-weight:700; color:var(--text); }
  .cal-date.sun{ color:var(--highlight); }
  .cal-date.sat{ color:var(--info); }
  .cal-todaymark{ font-size:11.5px; font-weight:700; color:var(--primary); line-height:1; margin-top:2px; }
  .cal-evs{ margin-top:5px; display:flex; flex-direction:column; gap:3px; }
  .cal-ev{ font-size:12px; font-weight:600; line-height:1.5; padding:2px 7px; border-radius:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer; }
  .cal-more{ font-size:12px; color:var(--text-muted); font-weight:600; margin-top:1px; padding-left:2px; }

  /* 우측 당일 패널 */
  .day-panel{ background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:24px; position:sticky; top:20px; }
  .day-head{ display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:4px; }
  .day-dow{ font-size:15px; font-weight:600; color:var(--text-sub); }
  .day-num{ font-size:38px; font-weight:800; letter-spacing:-0.02em; color:var(--text); line-height:1; margin-top:3px; }
  .day-add{ display:flex; align-items:center; gap:5px; height:36px; padding:0 14px; border:none; background:var(--primary); color:#fff; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  .day-add:hover{ background:var(--primary-hover); }
  .day-list{ margin-top:20px; display:flex; flex-direction:column; gap:10px; }
  .day-item{ display:flex; gap:12px; padding:14px 15px; border:1px solid var(--border); border-radius:10px; cursor:pointer; }
  .day-item:hover{ background:var(--surface-alt); }
  .day-item .bar{ width:4px; border-radius:999px; background:var(--c,#7a8093); flex-shrink:0; }
  .day-item .time{ font-size:13px; color:var(--text-muted); font-weight:600; }
  .day-item .title{ font-size:15px; font-weight:600; color:var(--text); margin-top:3px; line-height:1.4; }
  .day-item .type{ font-size:12px; color:var(--c,#7a8093); font-weight:700; margin-top:4px; }
  .day-empty{ margin-top:26px; text-align:center; color:var(--text-muted); font-size:14px; padding:30px 0; border:1px dashed var(--border-strong); border-radius:10px; line-height:1.7; }

  /* 모달 / 팝오버 */
  .modal-ov{ position:fixed; inset:0; background:rgba(16,24,40,.45); display:none; align-items:flex-start; justify-content:center; z-index:200; padding-top:90px; }
  .modal-ov.show{ display:flex; }
  .modal-box{ background:#fff; border-radius:16px; width:430px; max-width:calc(100vw - 40px); box-shadow:0 24px 60px rgba(16,24,40,.28); overflow:visible; }
  .modal-hd{ display:flex; align-items:center; justify-content:space-between; padding:20px 22px 8px; }
  .modal-hd .t{ display:flex; align-items:center; gap:8px; font-size:17px; font-weight:800; color:var(--text); }
  .modal-hd .t .plus{ color:var(--primary); font-size:20px; }
  .modal-hd .x{ cursor:pointer; color:var(--text-muted); font-size:22px; background:none; border:none; line-height:1; font-family:inherit; }
  .modal-bd{ padding:12px 22px 4px; }
  .mf{ margin-bottom:18px; }
  .mf-label{ font-size:13.5px; font-weight:700; color:var(--text); margin-bottom:9px; }
  .mf-label .req{ color:var(--highlight); }
  .mf-label .opt{ color:var(--text-muted); font-weight:500; font-size:12px; }
  .dow-pills{ display:flex; gap:7px; }
  .dow{ width:36px; height:36px; border-radius:50%; border:1px solid var(--border); background:var(--surface); font-size:13.5px; font-weight:700; color:var(--text-sub); cursor:pointer; font-family:inherit; }
  .dow.on{ background:var(--primary); border-color:var(--primary); color:#fff; }
  .dow.wknd{ color:var(--text-muted); }
  .m-input, .m-select{ width:100%; height:44px; border:1px solid var(--border); border-radius:9px; padding:0 13px; font-size:14px; font-family:inherit; color:var(--text); background:var(--surface); box-sizing:border-box; outline:none; }
  .m-input:focus, .m-select:focus{ border-color:var(--primary); box-shadow:0 0 0 4px var(--primary-ring); }
  textarea.m-input{ height:82px; padding:11px 13px; line-height:1.5; resize:vertical; }
  .time-row{ display:flex; align-items:center; gap:8px; }
  .time-row select{ height:44px; border:1px solid var(--border); border-radius:9px; padding:0 10px; font-family:inherit; font-size:14px; background:var(--surface); }
  .time-row .sep{ color:var(--text-muted); font-weight:600; }
  .modal-ft{ display:flex; justify-content:flex-end; gap:8px; padding:16px 22px; border-top:1px solid var(--border); margin-top:6px; }

  .pop-box{ background:#fff; border-radius:16px; width:320px; box-shadow:0 24px 60px rgba(16,24,40,.28); overflow:hidden; }
  .pop-hd{ display:flex; align-items:flex-start; justify-content:space-between; padding:20px 22px 10px; }
  .pop-type{ font-size:12px; font-weight:800; }
  .pop-title{ font-size:19px; font-weight:800; color:var(--text); margin-top:7px; letter-spacing:-0.01em; }
  .pop-edit{ width:32px; height:32px; border:1px solid var(--border); border-radius:8px; background:var(--surface); cursor:pointer; color:var(--text-sub); font-size:15px; flex-shrink:0; font-family:inherit; }
  .pop-edit:hover{ background:var(--primary-soft); color:var(--primary); border-color:var(--primary-line); }
  .pop-row{ display:flex; align-items:center; gap:8px; padding:5px 22px; font-size:13.5px; color:var(--text-sub); }
  .pop-row b{ color:var(--text); }
  .pop-ft{ display:flex; gap:8px; padding:16px 22px 20px; }

  /* 기간 등록 달력 */
  .range-row{ display:flex; align-items:center; gap:8px; }
  .range-sep{ color:var(--text-muted); font-weight:600; }
  .dp{ position:relative; flex:1; }
  .dp-field{ display:flex; align-items:center; justify-content:space-between; gap:6px; padding:0 12px; height:44px; border:1px solid var(--border); border-radius:9px; background:var(--surface); cursor:pointer; font-size:13.5px; color:var(--text); box-sizing:border-box; }
  .dp-field:hover{ border-color:var(--primary-line); } .dp-field svg{ color:var(--text-muted); flex-shrink:0; }
  .dp-pop{ position:absolute; top:calc(100% + 6px); left:0; z-index:60; width:280px; background:#fff; border:1px solid var(--border); border-radius:12px; box-shadow:0 12px 32px rgba(16,24,40,.16); padding:14px; display:none; }
  .dp-pop.open{ display:block; }
  .dp-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .dp-title{ font-size:14.5px; font-weight:700; }
  .dp-navs{ display:flex; gap:2px; }
  .dp-nav{ width:26px; height:26px; border:none; background:transparent; border-radius:6px; cursor:pointer; color:var(--text-sub); font-size:16px; font-family:inherit; }
  .dp-nav:hover{ background:var(--surface-alt); }
  .dp-week{ display:grid; grid-template-columns:repeat(7,1fr); }
  .dp-week span{ text-align:center; font-size:11.5px; color:var(--text-muted); font-weight:600; padding:5px 0; }
  .dp-week span.sun{ color:var(--highlight); }
  .dp-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:1px; }
  .dp-day{ height:32px; border:none; background:transparent; border-radius:7px; cursor:pointer; font-size:13px; color:var(--text); font-family:inherit; }
  .dp-day:hover{ background:var(--surface-alt); }
  .dp-day.other{ color:var(--text-placeholder); }
  .dp-day.sel{ background:var(--primary); color:#fff; font-weight:700; }
  .dp-foot{ display:flex; justify-content:flex-end; gap:6px; margin-top:8px; padding-top:10px; border-top:1px solid var(--border); }
  .dp-foot button{ padding:6px 12px; border-radius:7px; font-size:12.5px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:#fff; color:var(--text-sub); font-family:inherit; }
  .dp-foot .ok{ background:var(--primary); border-color:var(--primary); color:#fff; }
</style>
</head>

              <div class="dp-head"><div class="dp-title"></div><div class="dp-navs"><button type="button" class="dp-nav dp-prev">‹</button><button type="button" class="dp-nav dp-next">›</button></div></div>

        </div>
      </div>
      <div class="mf">
        <div class="mf-label">유형</div>
        <select class="m-select" id="fType">
          <option>무료강의</option><option>수업</option><option>특강</option><option>기수 시작</option><option>모집마감</option><option>미팅</option><option>촬영·제작</option><option>내부</option><option>행사</option><option>기타</option>
        </select>
      </div>
      <div class="mf">
        <div class="mf-label">시간 <span class="opt">(선택)</span></div>
        <div class="time-row">
          <select id="h1"></select><span class="sep">:</span><select id="m1"></select>
          <span class="sep">~</span>
          <select id="h2"></select><span class="sep">:</span><select id="m2"></select>
        </div>
      </div>
      <div class="mf">
        <div class="mf-label">메모 <span class="opt">(선택)</span></div>
        <textarea class="m-input" placeholder="장소·준비물·참고사항 등"></textarea>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn" onclick="closeForm()">취소</button>
      <button class="btn btn-primary" onclick="closeForm()">저장</button>
    </div>
  </div>
</div>

<!-- 일정 상세 팝오버 -->
<div class="modal-ov" id="detailModal">
  <div class="pop-box">
    <div class="pop-hd">
      <div>
        <div class="pop-type" id="dType" style="color:#5B46C4;">특강</div>
        <div class="pop-title" id="dTitle">톡딜머니 2기 특강</div>
      </div>
      <button class="pop-edit" onclick="openFormEdit()" title="수정">✎</button>
    </div>
    <div class="pop-row" id="dTime"><span>🕘</span> <b>21:00 ~ 23:00</b> · 2시간</div>
    <div class="pop-row" id="dLoc"><span>📍</span> 온라인 (Zoom)</div>
    <div class="pop-row"><span>🔗</span> 톡딜머니 · 2기</div>
    <div class="pop-ft"><button class="btn" style="flex:1;" onclick="closeDetail()">닫기</button></div>
  </div>
</div>

<script>
  // 백스테이지 톤 컬러 (디자인 토큰)
  var TYPE = {
    '무료강의':'#2876E5','수업':'#227EF6','특강':'#5B46C4','모집마감':'#C4262A',
    '기수시작':'#0E9A5E','기수종료':'#6B6B6B','촬영·제작':'#C2670D','미팅':'#2876E5',
    '내부':'#6B6B6B','행사':'#0E9A5E','기타':'#7A8093'
  };
  var EVENTS = {
    1:[{t:'19:00',title:'이커머스 PT 1기 무료강의',type:'무료강의'},{title:'점프투토스 1기 모집',type:'기수시작'},{title:'톡딜머니 2기 모집',type:'기수시작'},{title:'오토쿠팡 4기 모집마감',type:'모집마감'}],
    2:[{t:'19:00',title:'1기 무료강의 2차',type:'무료강의'}],
    3:[{title:'최튼튼 VOD 2회차 오픈',type:'기타'}],
    4:[{title:'쿠팡 매출팡팡 5기 종료',type:'기수종료'},{title:'점프투토스 1기 시작',type:'기수시작'},{title:'톡딜머니 2기 시작',type:'기수시작'},{title:'오토쿠팡 4기 시작',type:'기수시작'}],
    7:[{t:'21:00',title:'톡딜머니 2기 특강',type:'특강'},{title:'건대 교육원 서류 3종',type:'내부'}],
    9:[{t:'19:00',title:'쿠팡 PT 1기 무료강의',type:'무료강의'},{title:'쿠팡 매출팡팡 5기 종료',type:'기수종료'},{t:'20:00',title:'일당백 5기 온 4주차',type:'수업'}],
    11:[{t:'12:00',title:'톡딜머니 2기 수업',type:'수업'},{t:'14:00',title:'오토쿠팡 4기 수업',type:'수업'},{t:'15:00',title:'점프투토스 1기 수업',type:'수업'}],
    13:[{t:'14:00',title:'톡딜머니 2기 홍보 촬영',type:'촬영·제작'},{t:'16:00',title:'지은님 운영 싱크 미팅',type:'미팅'}],
    15:[{span:3,title:'톡딜머니 2기 오프라인 특강',type:'특강'}],
    18:[{t:'19:00',title:'길잡 3기 오프라인 4주차',type:'수업'}],
    19:[{t:'11:30',title:'톡딜머니 2기 특강 (광주)',type:'특강'}],
    21:[{t:'21:00',title:'톡딜머니 2기 특강',type:'특강'},{title:'테무로드 3기 종료',type:'기수종료'},{t:'20:00',title:'길잡 3기 온 4주차',type:'수업'}],
    22:[{title:'최튼튼 VOD 7회차 오픈',type:'기타'}],
    24:[{title:'최튼튼 VOD 8회차 오픈',type:'기타'}],
    25:[{title:'테스트 코스 1기 모집마감',type:'모집마감'},{title:'점프투토스 1기 시작',type:'기수시작'},{title:'포터 1기 오프라인 4주차',type:'수업'}],
    28:[{t:'21:00',title:'톡딜머니 2기 특강',type:'특강'},{title:'테스트 코스 1기 시작',type:'기수시작'}],
    29:[{span:3,title:'월말 정산 마감 주간',type:'내부'}]
  };
  // 멀티데이(연속) 일정 커버리지 맵
  var COVER = {};
  Object.keys(EVENTS).forEach(function(k){
    var day=+k;
    EVENTS[day].forEach(function(e){
      if(e.span && e.span>1){ for(var i=0;i<e.span;i++){ var dd=day+i; (COVER[dd]=COVER[dd]||[]).push({e:e,start:i===0,end:i===e.span-1}); } }
    });
  });
  var view = { y:2026, m:6 };
  var TODAY = { y:2026, m:6, d:13 };
  var sel = { y:2026, m:6, d:13 };
  var DOW = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  function p2(n){ return (n<10?'0':'')+n; }
  function rgba(hex,a){ hex=hex.replace('#',''); return 'rgba('+parseInt(hex.substr(0,2),16)+','+parseInt(hex.substr(2,2),16)+','+parseInt(hex.substr(4,2),16)+','+a+')'; }
  function isJul(){ return view.y===2026 && view.m===6; }
  function singlesFor(d){ return (isJul() && EVENTS[d]) ? EVENTS[d].filter(function(e){return !e.span;}) : []; }
  function coverFor(d){ return isJul() ? (COVER[d]||[]) : []; }

  function renderGrid(){
    document.getElementById('calMonth').textContent = view.y+'년 '+(view.m+1)+'월';
    var first = new Date(view.y, view.m, 1).getDay();
    var days = new Date(view.y, view.m+1, 0).getDate();
    var prevDays = new Date(view.y, view.m, 0).getDate();
    var cells = [];
    for (var i=first-1;i>=0;i--) cells.push({d:prevDays-i, other:true});
    for (var d=1;d<=days;d++) cells.push({d:d, other:false});
    while (cells.length % 7 !== 0) cells.push({d:cells.length-(first+days)+1, other:true});
    var g = document.getElementById('calGrid'); g.innerHTML='';
    cells.forEach(function(c, idx){
      var col = idx % 7;
      var cell = document.createElement('div');
      cell.className = 'cal-cell' + (c.other?' other':'');
      var isToday = !c.other && view.y===TODAY.y && view.m===TODAY.m && c.d===TODAY.d;
      var isSel   = !c.other && view.y===sel.y && view.m===sel.m && c.d===sel.d;
      if (isToday) cell.className += ' today';
      if (isSel) cell.className += ' sel';
      var dcls = col===0 ? ' sun' : (col===6 ? ' sat' : '');
      var evHtml = '';
      if(!c.other){
        // 멀티데이 연속 바 (컬러 채움 · 여러 날 이어짐)
        coverFor(c.d).forEach(function(m){
          var color = TYPE[m.e.type]||'#7a8093';
          var vStart = m.start || col===0, vEnd = m.end || col===6;
          var ml = vStart?'0':'-9px', mr = vEnd?'0':'-9px';
          var rl = vStart?'5px':'0', rr = vEnd?'5px':'0';
          var title = (m.start||col===0) ? m.e.title : '&nbsp;';
          evHtml += '<div class="cal-ev" style="background:'+color+';color:#fff;margin-left:'+ml+';margin-right:'+mr+';border-radius:'+rl+' '+rr+' '+rr+' '+rl+';">'+title+'</div>';
        });
        // 단일 일정 (컬러 네모박스 · 옅은 배경 + 컬러 글자)
        var singles = singlesFor(c.d);
        singles.slice(0,3).forEach(function(e){
          var color = TYPE[e.type]||'#7a8093';
          evHtml += '<div class="cal-ev" style="background:'+rgba(color,0.14)+';color:'+color+';">'+(e.t?e.t+' ':'')+e.title+'</div>';
        });
        if (singles.length>3) evHtml += '<div class="cal-more">+'+(singles.length-3)+' 더보기</div>';
      }
      cell.innerHTML = '<span class="cal-date'+dcls+'">'+p2(c.d)+'</span>'+(isToday?'<div class="cal-todaymark">오늘</div>':'')+'<div class="cal-evs">'+evHtml+'</div>';
      if (!c.other) cell.onclick = function(ev){ if(ev.target.closest('.cal-ev')){ openDetail(); return; } sel={y:view.y,m:view.m,d:c.d}; renderGrid(); renderPanel(); };
      g.appendChild(cell);
    });
  }

  function renderPanel(){
    var dow = new Date(sel.y, sel.m, sel.d).getDay();
    document.getElementById('dayDow').textContent = (sel.m+1)+'월 · '+DOW[dow];
    document.getElementById('dayNum').textContent = sel.d;
    var evs = [];
    coverFor(sel.d).forEach(function(m){ evs.push(m.e); });
    singlesFor(sel.d).forEach(function(e){ evs.push(e); });
    var list = document.getElementById('dayList');
    if (!evs.length){ list.innerHTML = '<div class="day-empty">이 날 예정된 일정이 없어요<br>+ 추가로 일정을 등록하세요</div>'; return; }
    var html = '<div class="day-list">';
    evs.forEach(function(e){
      var c = TYPE[e.type]||'#7a8093';
      html += '<div class="day-item" style="--c:'+c+'"><div class="bar"></div><div style="flex:1; min-width:0;">'+
        (e.t?'<div class="time">'+e.t+'</div>':'')+
        '<div class="title">'+e.title+(e.span?' <span style="font-size:11px;color:var(--text-muted);font-weight:600;">· '+e.span+'일간</span>':'')+'</div>'+
        '<div class="type">'+e.type+'</div></div></div>';
    });
    html += '</div>';
    list.innerHTML = html;
  }

  window.calMove = function(n){ view.m+=n; if(view.m<0){view.m=11;view.y--;} if(view.m>11){view.m=0;view.y++;} renderGrid(); };
  window.calGoToday = function(){ view={y:TODAY.y,m:TODAY.m}; sel={y:TODAY.y,m:TODAY.m,d:TODAY.d}; renderGrid(); renderPanel(); };
  window.addEvent = function(){ openForm('new'); };

  renderGrid();
  renderPanel();
  document.getElementById('dayList').addEventListener('click', function(e){ if(e.target.closest('.day-item')) openDetail(); });

  // ── 모달 제어 ──
  function show(id,on){ document.getElementById(id).classList.toggle('show', on); }
  window.openForm = function(mode){ document.getElementById('formTitle').textContent = (mode==='edit'?'일정 수정':'일정 등록'); show('detailModal',false); show('formModal',true); };
  window.closeForm = function(){ show('formModal',false); };
  window.openDetail = function(){ show('formModal',false); show('detailModal',true); };
  window.closeDetail = function(){ show('detailModal',false); };
  window.openFormEdit = function(){ openForm('edit'); };
  document.querySelectorAll('#dowPills .dow').forEach(function(d){ d.addEventListener('click', function(){ d.classList.toggle('on'); }); });
  (function(){
    var hs=''; for(var h=0;h<24;h++){ var hh=(h<10?'0':'')+h; hs+='<option>'+hh+'</option>'; }
    var ms=''; ['00','10','20','30','40','50'].forEach(function(m){ ms+='<option>'+m+'</option>'; });
    document.getElementById('h1').innerHTML=hs; document.getElementById('h2').innerHTML=hs;
    document.getElementById('m1').innerHTML=ms; document.getElementById('m2').innerHTML=ms;
    document.getElementById('h1').value='09'; document.getElementById('h2').value='18';
  })();
  ['formModal','detailModal'].forEach(function(id){ document.getElementById(id).addEventListener('click', function(e){ if(e.target.id===id) show(id,false); }); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape'){ show('formModal',false); show('detailModal',false); } });

  // 기간 등록 커스텀 달력
  function initDP(root){
    var view={y:+root.dataset.y, m:+root.dataset.m}, sel={y:+root.dataset.y, m:+root.dataset.m, d:+root.dataset.d}, pend=null;
    var pop=root.querySelector('.dp-pop'), label=root.querySelector('.dp-label'), title=root.querySelector('.dp-title'), grid=root.querySelector('.dp-grid');
    var pad=function(n){return (n<10?'0':'')+n;};
    function render(){
      title.textContent = view.y+'년 '+(view.m+1)+'월';
      var first=new Date(view.y,view.m,1).getDay(), days=new Date(view.y,view.m+1,0).getDate(), prev=new Date(view.y,view.m,0).getDate();
      grid.innerHTML=''; var cur=pend||sel;
      function mk(t,cls,day){ var b=document.createElement('button'); b.type='button'; b.className='dp-day'+(cls?' '+cls:''); b.textContent=t; if(day) b.onclick=function(){ pend={y:view.y,m:view.m,d:day}; render(); }; return b; }
      for(var i=first-1;i>=0;i--) grid.appendChild(mk(prev-i,'other'));
      for(var d=1;d<=days;d++){ var s=(cur&&cur.y===view.y&&cur.m===view.m&&cur.d===d)?'sel':''; grid.appendChild(mk(d,s,d)); }
      var tr=(7-(first+days)%7)%7; for(var t=1;t<=tr;t++) grid.appendChild(mk(t,'other'));
    }
    root.querySelector('.dp-field').onclick=function(e){ e.stopPropagation(); document.querySelectorAll('.dp-pop.open').forEach(function(p){ if(p!==pop) p.classList.remove('open'); }); pop.classList.toggle('open'); if(pop.classList.contains('open')){ pend=null; view={y:sel.y,m:sel.m}; render(); } };
    root.querySelector('.dp-prev').onclick=function(){ view.m--; if(view.m<0){view.m=11;view.y--;} render(); };
    root.querySelector('.dp-next').onclick=function(){ view.m++; if(view.m>11){view.m=0;view.y++;} render(); };
    root.querySelector('.dp-cancel').onclick=function(){ pop.classList.remove('open'); pend=null; };
    root.querySelector('.dp-ok').onclick=function(){ if(pend) sel=pend; label.textContent=sel.y+'. '+pad(sel.m+1)+'. '+pad(sel.d)+'.'; pop.classList.remove('open'); };
    render();
  }
  document.querySelectorAll('.dp').forEach(initDP);
  document.addEventListener('click', function(e){ document.querySelectorAll('.dp').forEach(function(r){ if(!r.contains(e.target)) r.querySelector('.dp-pop').classList.remove('open'); }); });
</script>
  <script src="_select.js"></script>
  <script src="_datepicker.js"></script>
</body>
</html>
