<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<title>ClassHub Backstage · 설정</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="_shared.css">
<style>
  .set-grid{ margin-top:20px; display:flex; flex-direction:column; gap:20px; max-width:760px; }
  .set-card{ background:var(--surface); border:1px solid var(--border); border-radius:14px; }
  .set-head{ padding:18px 24px 4px; }
  .set-head h2{ font-size:15px; font-weight:800; color:var(--text); }
  .set-head p{ font-size:12.5px; color:var(--text-muted); margin-top:4px; }
  .set-body{ padding:12px 24px 20px; }
  .set-row{ display:flex; gap:16px; padding:13px 0; border-bottom:1px solid var(--border); font-size:14px; align-items:center; }
  .set-row:last-child{ border-bottom:none; }
  .set-row .k{ width:120px; flex-shrink:0; color:var(--text-muted); font-weight:600; }
  .set-row .v{ color:var(--text); font-weight:500; flex:1; }
  .set-row .v .role{ display:inline-block; font-size:12px; font-weight:700; padding:3px 9px; border-radius:6px; background:var(--primary-soft); color:var(--primary); }
  .ci{ height:42px; padding:0 12px; border:1px solid var(--border-strong); border-radius:8px; font-size:14px; font-family:inherit; background:#fff; color:var(--text); outline:none; box-shadow:var(--shadow-xs); }
  .ci:focus{ border-color:var(--primary); box-shadow:0 0 0 4px var(--primary-ring); }
  .ci.wide{ width:320px; max-width:100%; }

  /* 비밀번호 변경 모달 */
  .backdrop{ position:fixed; inset:0; background:rgba(29,29,29,0.5); display:none; place-items:center; padding:20px; z-index:100; }
  .backdrop.on{ display:grid; }
  .pw-modal{ width:100%; max-width:440px; background:var(--surface); border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.25); padding:26px 26px 24px; }
  .pw-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
  .pw-head h3{ font-size:19px; font-weight:800; color:var(--text); }
  .pw-close{ width:32px; height:32px; border:none; background:transparent; color:var(--text-muted); cursor:pointer; display:grid; place-items:center; border-radius:8px; }
  .pw-close:hover{ background:var(--surface-alt); color:var(--text); }
  .pw-field{ margin-bottom:16px; }
  .pw-field label{ display:block; font-size:13.5px; font-weight:700; color:var(--text); margin-bottom:7px; }
  .pw-inwrap{ position:relative; }
  .pw-inwrap input{ width:100%; height:46px; padding:0 44px 0 14px; border:1px solid var(--border-strong); border-radius:9px; font-size:14px; font-family:inherit; background:#fff; color:var(--text); outline:none; }
  .pw-inwrap input:focus{ border-color:var(--primary); box-shadow:0 0 0 4px var(--primary-ring); }
  .pw-eye{ position:absolute; right:10px; top:50%; transform:translateY(-50%); width:28px; height:28px; border:none; background:transparent; color:var(--text-muted); cursor:pointer; display:grid; place-items:center; }
  .pw-eye svg{ width:18px; height:18px; }
  .pw-hint{ font-size:12px; color:var(--text-muted); margin-top:6px; }
  .pw-foot{ display:flex; gap:10px; margin-top:24px; }
  .pw-foot button{ flex:1; height:46px; border-radius:9px; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; }
  .pw-foot .cancel{ background:var(--surface); border:1px solid var(--border-strong); color:var(--text-sub); }
  .pw-foot .cancel:hover{ background:var(--surface-alt); }
  .pw-foot .submit{ background:var(--primary); border:none; color:#fff; }
  .pw-foot .submit:hover{ background:var(--primary-hover); }
</style>
</head>
